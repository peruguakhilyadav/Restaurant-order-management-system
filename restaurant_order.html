<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Restaurant Order Management System</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0d0b;
            --surface: #1a1612;
            --surface2: #231f1a;
            --accent: #e8833a;
            --accent2: #c96b1e;
            --gold: #f5c842;
            --text: #f0ebe4;
            --muted: #8a7f74;
            --border: #2e2720;
            --green: #5cb85c;
            --red: #e05252;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        header {
            background: linear-gradient(135deg, #1a1208 0%, #2a1a08 50%, #1a1208 100%);
            border-bottom: 1px solid var(--accent);
            padding: 28px 40px;
            display: flex;
            align-items: center;
            gap: 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 40px rgba(232,131,58,0.15);
        }

        header .logo { font-size: 32px; }
        header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--accent);
            letter-spacing: 0.5px;
        }
        header p { font-size: 13px; color: var(--muted); }

        .layout {
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 24px;
            max-width: 1200px;
            margin: 28px auto;
            padding: 0 20px;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 24px;
            margin-bottom: 20px;
        }

        .card h2 {
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            color: var(--accent);
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Customer Details */
        .input-row { display: flex; gap: 12px; }
        input[type="text"], input[type="number"] {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            padding: 10px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            width: 100%;
            transition: border-color 0.2s;
        }
        input:focus { outline: none; border-color: var(--accent); }
        input::placeholder { color: var(--muted); }

        /* Menu Grid */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .menu-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 12px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: border-color 0.2s, transform 0.15s;
            cursor: default;
        }
        .menu-item:hover { border-color: var(--accent); transform: translateY(-1px); }

        .menu-item .info { flex: 1; }
        .menu-item .name { font-size: 14px; font-weight: 500; }
        .menu-item .price {
            font-size: 15px;
            font-weight: 700;
            color: var(--accent);
            margin-top: 2px;
        }
        .menu-item .rating-display {
            font-size: 11px;
            color: var(--gold);
            margin-top: 3px;
        }

        .add-btn {
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            padding: 7px 14px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
            white-space: nowrap;
        }
        .add-btn:hover { background: var(--accent2); }

        /* Cart */
        .cart-sticky { position: sticky; top: 100px; }
        .cart-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--border);
            animation: slideIn 0.2s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }

        .cart-item .item-name { flex: 1; font-size: 14px; }
        .cart-item .item-price { font-weight: 700; color: var(--accent); font-size: 14px; }
        .remove-btn {
            background: none;
            border: 1px solid #444;
            color: var(--red);
            border-radius: 5px;
            padding: 3px 8px;
            font-size: 12px;
            cursor: pointer;
            transition: background 0.2s;
        }
        .remove-btn:hover { background: rgba(224,82,82,0.15); }

        .total-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 16px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
        }
        .total-label { font-size: 15px; color: var(--muted); }
        .total-amount { font-size: 22px; font-weight: 700; color: var(--accent); }

        .generate-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-family: 'Playfair Display', serif;
            font-size: 16px;
            cursor: pointer;
            margin-top: 16px;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
        }
        .generate-btn:hover { opacity: 0.9; transform: translateY(-1px); }
        .generate-btn:active { transform: translateY(0); }

        .empty-cart { color: var(--muted); font-size: 14px; text-align: center; padding: 20px 0; }

        /* Bill Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.7);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .modal-overlay.active { display: flex; }

        .modal {
            background: var(--surface);
            border: 1px solid var(--accent);
            border-radius: 18px;
            padding: 32px;
            width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes popIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        .bill-header {
            text-align: center;
            margin-bottom: 24px;
        }
        .bill-header .icon { font-size: 40px; }
        .bill-header h2 {
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            color: var(--accent);
            margin: 8px 0 4px;
        }
        .bill-header p { color: var(--muted); font-size: 13px; }

        .bill-info {
            background: var(--surface2);
            border-radius: 10px;
            padding: 14px 16px;
            margin-bottom: 16px;
            font-size: 14px;
        }
        .bill-info div { display: flex; justify-content: space-between; margin-bottom: 6px; }
        .bill-info div:last-child { margin-bottom: 0; }
        .bill-info span:first-child { color: var(--muted); }
        .bill-info span:last-child { font-weight: 500; }

        .bill-items { margin-bottom: 16px; }
        .bill-items h3 {
            font-size: 13px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }
        .bill-item-row {
            display: flex;
            justify-content: space-between;
            font-size: 14px;
            padding: 6px 0;
            border-bottom: 1px dashed var(--border);
        }
        .bill-item-row:last-child { border-bottom: none; }
        .bill-total {
            background: linear-gradient(135deg, rgba(232,131,58,0.15), rgba(232,131,58,0.05));
            border: 1px solid rgba(232,131,58,0.3);
            border-radius: 10px;
            padding: 14px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        .bill-total span:first-child { font-size: 15px; font-weight: 500; }
        .bill-total span:last-child { font-size: 22px; font-weight: 700; color: var(--accent); }

        /* Rating Section */
        .rating-section h3 {
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            color: var(--text);
            margin-bottom: 16px;
            text-align: center;
        }

        .item-rating-block {
            background: var(--surface2);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 10px;
        }
        .item-rating-block .item-label {
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .item-rating-block .item-label .item-price-small { color: var(--accent); font-size: 13px; }

        .stars {
            display: flex;
            gap: 5px;
            margin-bottom: 8px;
        }
        .star {
            font-size: 22px;
            cursor: pointer;
            color: #444;
            transition: color 0.15s, transform 0.1s;
        }
        .star:hover, .star.active { color: var(--gold); transform: scale(1.15); }

        .review-input {
            background: var(--bg);
            border: 1px solid var(--border);
            border-radius: 7px;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            padding: 8px 12px;
            width: 100%;
            resize: none;
            height: 56px;
            transition: border-color 0.2s;
        }
        .review-input:focus { outline: none; border-color: var(--accent); }
        .review-input::placeholder { color: var(--muted); }

        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-secondary {
            flex: 1;
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--text);
            border-radius: 10px;
            padding: 12px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.2s;
        }
        .btn-secondary:hover { border-color: var(--accent); }
        .btn-primary {
            flex: 2;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: white;
            border-radius: 10px;
            padding: 12px;
            font-family: 'Playfair Display', serif;
            font-size: 15px;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn-primary:hover { opacity: 0.9; }

        .thank-you {
            text-align: center;
            padding: 20px 0;
        }
        .thank-you .big-icon { font-size: 60px; margin-bottom: 12px; }
        .thank-you h2 {
            font-family: 'Playfair Display', serif;
            font-size: 26px;
            color: var(--accent);
            margin-bottom: 8px;
        }
        .thank-you p { color: var(--muted); font-size: 14px; margin-bottom: 20px; }

        .submitted-ratings { margin: 16px 0; text-align: left; }
        .submitted-rating-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }
        .submitted-rating-row:last-child { border-bottom: none; }
        .submitted-rating-row .stars-display { color: var(--gold); letter-spacing: 1px; }
        .submitted-rating-row .review-text { color: var(--muted); font-size: 12px; margin-top: 2px; }

        /* Menu category filter */
        .filter-bar {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .filter-chip {
            background: var(--surface2);
            border: 1px solid var(--border);
            color: var(--muted);
            border-radius: 20px;
            padding: 5px 14px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-chip.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        /* Ratings badge on menu items */
        .avg-badge {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            background: rgba(245,200,66,0.12);
            border: 1px solid rgba(245,200,66,0.25);
            border-radius: 20px;
            padding: 1px 7px;
            font-size: 11px;
            color: var(--gold);
        }

        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: var(--bg); }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
    </style>
</head>
<body>

<header>
    <div class="logo">🍽️</div>
    <div>
        <h1>Spice & Ember</h1>
        <p>Order Management System</p>
    </div>
</header>

<div class="layout">
    <!-- LEFT COLUMN -->
    <div>
        <!-- Customer Details -->
        <div class="card">
            <h2>👤 Customer Details</h2>
            <div class="input-row">
                <input type="text" id="customerName" placeholder="Customer Name">
                <input type="number" id="tableNumber" placeholder="Table No." style="max-width:140px">
            </div>
        </div>

        <!-- Menu -->
        <div class="card">
            <h2>📋 Menu</h2>
            <div class="filter-bar" id="filterBar"></div>
            <div class="menu-grid" id="menuGrid"></div>
        </div>
    </div>

    <!-- RIGHT COLUMN -->
    <div class="cart-sticky">
        <div class="card">
            <h2>🛒 Order Summary</h2>
            <div id="cartItems"><p class="empty-cart">No items added yet</p></div>
            <div class="total-row">
                <span class="total-label">Total Amount</span>
                <span class="total-amount">₹<span id="totalAmount">0</span></span>
            </div>
            <button class="generate-btn" onclick="openBillModal()">Generate Bill & Pay</button>
        </div>
    </div>
</div>

<!-- Bill + Rating Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal" id="modalContent"></div>
</div>

<script>
const menuData = [
    // Main
    { name: 'Pizza', price: 200, category: 'Main', emoji: '🍕' },
    { name: 'Burger', price: 150, category: 'Main', emoji: '🍔' },
    { name: 'Pasta', price: 180, category: 'Main', emoji: '🍝' },
    { name: 'Biryani', price: 199, category: 'Main', emoji: '🍛' },
    { name: 'Butter Chicken', price: 200, category: 'Main', emoji: '🍗' },
    { name: 'Chicken Curry', price: 80, category: 'Main', emoji: '🍲' },
    { name: 'Paneer Butter Masala', price: 200, category: 'Main', emoji: '🧆' },
    { name: 'Dal Tadka', price: 120, category: 'Main', emoji: '🥣' },
    { name: 'Veg Fried Rice', price: 140, category: 'Main', emoji: '🍚' },
    { name: 'Egg Curry', price: 130, category: 'Main', emoji: '🥚' },
    { name: 'Fish Fry', price: 280, category: 'Main', emoji: '🐟' },
    { name: 'Mutton Rogan Josh', price: 320, category: 'Main', emoji: '🍖' },
    // Starters
    { name: 'Chicken 65', price: 250, category: 'Starters', emoji: '🍗' },
    { name: 'Veg Spring Rolls', price: 120, category: 'Starters', emoji: '🌯' },
    { name: 'Paneer Tikka', price: 220, category: 'Starters', emoji: '🧀' },
    { name: 'Gobi Manchurian', price: 160, category: 'Starters', emoji: '🥦' },
    { name: 'Prawn Cocktail', price: 300, category: 'Starters', emoji: '🍤' },
    { name: 'Samosa (2 pcs)', price: 50, category: 'Starters', emoji: '🥟' },
    // Breads
    { name: 'Roti', price: 45, category: 'Breads', emoji: '🫓' },
    { name: 'Butter Naan', price: 60, category: 'Breads', emoji: '🍞' },
    { name: 'Garlic Naan', price: 70, category: 'Breads', emoji: '🧄' },
    { name: 'Paratha', price: 55, category: 'Breads', emoji: '🫔' },
    // Desserts
    { name: 'Chocolate Brownie', price: 150, category: 'Desserts', emoji: '🍫' },
    { name: 'Gulab Jamun', price: 80, category: 'Desserts', emoji: '🍮' },
    { name: 'Ice Cream Scoop', price: 100, category: 'Desserts', emoji: '🍨' },
    { name: 'Kheer', price: 90, category: 'Desserts', emoji: '🍚' },
    { name: 'Rasgulla (2 pcs)', price: 70, category: 'Desserts', emoji: '🍡' },
    // Drinks
    { name: 'Coffee', price: 80, category: 'Drinks', emoji: '☕' },
    { name: 'Masala Chai', price: 40, category: 'Drinks', emoji: '🍵' },
    { name: 'Mango Lassi', price: 90, category: 'Drinks', emoji: '🥭' },
    { name: 'Fresh Lime Soda', price: 60, category: 'Drinks', emoji: '🍋' },
    { name: 'Thumbs Up', price: 20, category: 'Drinks', emoji: '🥤' },
    { name: 'Orange Juice', price: 80, category: 'Drinks', emoji: '🍊' },
    { name: 'Water Bottle', price: 30, category: 'Drinks', emoji: '💧' },
];

let cart = [];
let total = 0;
let currentFilter = 'All';
// ratings: { itemName: [ {rating, review} ] }
let ratingsDB = {};

const categories = ['All', ...new Set(menuData.map(i => i.category))];

function getAvgRating(name) {
    const recs = ratingsDB[name];
    if (!recs || recs.length === 0) return null;
    return (recs.reduce((s, r) => s + r.rating, 0) / recs.length).toFixed(1);
}

function starsString(rating, max = 5) {
    const full = Math.round(rating);
    return '★'.repeat(full) + '☆'.repeat(max - full);
}

function buildFilterBar() {
    const bar = document.getElementById('filterBar');
    bar.innerHTML = '';
    categories.forEach(cat => {
        const chip = document.createElement('button');
        chip.className = 'filter-chip' + (cat === currentFilter ? ' active' : '');
        chip.textContent = cat;
        chip.onclick = () => { currentFilter = cat; buildFilterBar(); buildMenu(); };
        bar.appendChild(chip);
    });
}

function buildMenu() {
    const grid = document.getElementById('menuGrid');
    grid.innerHTML = '';
    const filtered = currentFilter === 'All' ? menuData : menuData.filter(i => i.category === currentFilter);
    filtered.forEach(item => {
        const avg = getAvgRating(item.name);
        const count = ratingsDB[item.name]?.length || 0;
        const div = document.createElement('div');
        div.className = 'menu-item';
        div.innerHTML = `
            <div class="info">
                <div class="name">${item.emoji} ${item.name}</div>
                <div class="price">₹${item.price}</div>
                ${avg ? `<div class="rating-display"><span class="avg-badge">★ ${avg}</span> <span style="color:var(--muted);font-size:10px">${count} review${count>1?'s':''}</span></div>` : '<div class="rating-display" style="color:var(--muted);font-size:11px">No ratings yet</div>'}
            </div>
            <button class="add-btn" onclick="addToCart('${item.name}', ${item.price})">+ Add</button>
        `;
        grid.appendChild(div);
    });
}

function addToCart(name, price) {
    cart.push({ name, price });
    total += price;
    displayCart();
}

function displayCart() {
    const container = document.getElementById('cartItems');
    if (cart.length === 0) {
        container.innerHTML = '<p class="empty-cart">No items added yet</p>';
    } else {
        container.innerHTML = '';
        cart.forEach((item, index) => {
            const div = document.createElement('div');
            div.className = 'cart-item';
            div.innerHTML = `
                <span class="item-name">${item.name}</span>
                <span class="item-price">₹${item.price}</span>
                <button class="remove-btn" onclick="removeItem(${index})">✕</button>
            `;
            container.appendChild(div);
        });
    }
    document.getElementById('totalAmount').textContent = total;
}

function removeItem(index) {
    total -= cart[index].price;
    cart.splice(index, 1);
    displayCart();
}

// Deduplicate cart items for rating (unique names)
function getUniqueCartItems() {
    const seen = new Set();
    return cart.filter(item => { if (seen.has(item.name)) return false; seen.add(item.name); return true; });
}

function openBillModal() {
    const name = document.getElementById('customerName').value.trim();
    const table = document.getElementById('tableNumber').value.trim();
    if (!name || !table) { alert('Please enter customer details!'); return; }
    if (cart.length === 0) { alert('No items in cart!'); return; }

    const modal = document.getElementById('modalContent');
    const uniqueItems = getUniqueCartItems();

    // Count items
    const itemCounts = {};
    cart.forEach(i => { itemCounts[i.name] = (itemCounts[i.name] || 0) + 1; });

    // Ratings state
    const ratingState = {};
    uniqueItems.forEach(i => { ratingState[i.name] = { stars: 0, review: '' }; });

    function renderBillModal() {
        modal.innerHTML = `
            <div class="bill-header">
                <div class="icon">🧾</div>
                <h2>Order Confirmed!</h2>
                <p>Your bill is ready. Please rate your items below.</p>
            </div>

            <div class="bill-info">
                <div><span>Customer</span><span>${name}</span></div>
                <div><span>Table No.</span><span>${table}</span></div>
                <div><span>Order Time</span><span>${new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</span></div>
            </div>

            <div class="bill-items">
                <h3>Items Ordered</h3>
                ${Object.entries(itemCounts).map(([iName, qty]) => {
                    const price = cart.find(c => c.name === iName).price;
                    return `<div class="bill-item-row">
                        <span>${iName} ${qty > 1 ? `×${qty}` : ''}</span>
                        <span>₹${price * qty}</span>
                    </div>`;
                }).join('')}
            </div>

            <div class="bill-total">
                <span>Total Amount</span>
                <span>₹${total}</span>
            </div>

            <div class="rating-section">
                <h3>⭐ Rate Your Experience</h3>
                ${uniqueItems.map(item => `
                    <div class="item-rating-block" id="rblock-${item.name.replace(/\s/g,'_')}">
                        <div class="item-label">
                            <span>${item.name}</span>
                            <span class="item-price-small">₹${item.price}</span>
                        </div>
                        <div class="stars" id="stars-${item.name.replace(/\s/g,'_')}">
                            ${[1,2,3,4,5].map(s => `<span class="star ${ratingState[item.name].stars >= s ? 'active':''}" onclick="setStar('${item.name}', ${s})">★</span>`).join('')}
                        </div>
                        <textarea class="review-input" id="rev-${item.name.replace(/\s/g,'_')}" placeholder="Write a short review (optional)..." oninput="setReview('${item.name}', this.value)">${ratingState[item.name].review}</textarea>
                    </div>
                `).join('')}
            </div>

            <div class="modal-actions">
                <button class="btn-secondary" onclick="closeModal()">Close</button>
                <button class="btn-primary" onclick="submitRatings()">Submit Ratings</button>
            </div>
        `;

        // Expose functions to stars
        window.setStar = function(itemName, stars) {
            ratingState[itemName].stars = stars;
            const key = itemName.replace(/\s/g,'_');
            const starEls = document.querySelectorAll(`#stars-${key} .star`);
            starEls.forEach((el, i) => el.classList.toggle('active', i < stars));
        };
        window.setReview = function(itemName, val) {
            ratingState[itemName].review = val;
        };
        window.submitRatings = function() {
            // Save ratings
            uniqueItems.forEach(item => {
                const { stars, review } = ratingState[item.name];
                if (stars > 0) {
                    if (!ratingsDB[item.name]) ratingsDB[item.name] = [];
                    ratingsDB[item.name].push({ rating: stars, review });
                }
            });

            // Show thank you
            modal.innerHTML = `
                <div class="thank-you">
                    <div class="big-icon">🎉</div>
                    <h2>Thank You, ${name}!</h2>
                    <p>Your order has been completed and your feedback has been recorded.</p>
                    <div class="submitted-ratings">
                        ${uniqueItems.filter(i => ratingState[i.name].stars > 0).map(item => `
                            <div class="submitted-rating-row">
                                <div>
                                    <div>${item.name}</div>
                                    ${ratingState[item.name].review ? `<div class="review-text">"${ratingState[item.name].review}"</div>` : ''}
                                </div>
                                <div class="stars-display">${starsString(ratingState[item.name].stars)} ${ratingState[item.name].stars}/5</div>
                            </div>
                        `).join('')}
                        ${uniqueItems.every(i => ratingState[i.name].stars === 0) ? '<p style="color:var(--muted);text-align:center;font-size:13px">No ratings given</p>' : ''}
                    </div>
                    <button class="btn-primary" style="width:100%" onclick="closeModal()">Done</button>
                </div>
            `;

            // Reset cart
            cart = [];
            total = 0;
            displayCart();
            buildMenu(); // refresh ratings on menu
        };
    }

    renderBillModal();
    document.getElementById('modalOverlay').classList.add('active');
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('active');
}

// Click outside to close
document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
});

// Init
buildFilterBar();
buildMenu();
</script>
</body>
</html>
