<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Spice & Ember</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0f0d0b;
            --surface: #1a1612;
            --surface2: #231f1a;
            --accent: #e8833a;
            --accent2: #c96b1e;
            --gold: #f5c842;
            --text: #f0ebe4;
            --muted: #8a7f74;
            --border: #2e2720;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-image: radial-gradient(circle at center, #1a1208 0%, var(--bg) 70%);
        }

        .login-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 40px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5), 0 0 20px rgba(232,131,58,0.1);
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            font-size: 48px;
            margin-bottom: 10px;
            display: inline-block;
        }

        .header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            color: var(--accent);
            letter-spacing: 0.5px;
            margin-bottom: 5px;
        }

        .header p {
            color: var(--muted);
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            color: var(--muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 10px;
            color: var(--text);
            padding: 12px 16px;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
            transition: all 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(232,131,58,0.1);
        }

        .form-group input::placeholder {
            color: #554e47;
        }

        .options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 13px;
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            color: var(--muted);
        }

        .remember-me input[type="checkbox"] {
            accent-color: var(--accent);
            width: 14px;
            height: 14px;
            cursor: pointer;
        }

        .forgot-password {
            color: var(--accent);
            text-decoration: none;
            transition: color 0.2s;
        }

        .forgot-password:hover {
            color: var(--accent2);
            text-decoration: underline;
        }

        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-family: 'Playfair Display', serif;
            font-size: 18px;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
            letter-spacing: 0.5px;
            box-shadow: 0 4px 15px rgba(232,131,58,0.2);
        }

        .login-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .login-btn:active {
            transform: translateY(1px);
        }

        .divider {
            display: flex;
            align-items: center;
            text-align: center;
            margin: 24px 0;
            color: var(--muted);
            font-size: 13px;
        }

        .divider::before, .divider::after {
            content: '';
            flex: 1;
            border-bottom: 1px solid var(--border);
        }

        .divider span {
            padding: 0 10px;
        }

        .signup-link {
            text-align: center;
            font-size: 14px;
            color: var(--muted);
        }

        .signup-link a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .signup-link a:hover {
            color: var(--accent2);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="header">
        <div class="logo-icon">🍽️</div>
        <h1>Spice & Ember</h1>
        <p>Sign in to your account</p>
    </div>

    <form action="restaurant_order.html" method="GET">
        <div class="form-group">
            <label for="username">User Name</label>
            <input type="text" id="username" placeholder="Enter your user name" required>
        </div>

        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div class="options">
            <label class="remember-me">
                <input type="checkbox">
                Remember me
            </label>
            <a href="#" class="forgot-password">Forgot password?</a>
        </div>

        <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="divider">
        <span>or</span>
    </div>

    <div class="signup-link">
        Don't have an account? <a href="#">Create Account</a>
    </div>
</div>

</body>
</html>
